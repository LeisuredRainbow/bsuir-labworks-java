# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_agency
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Авто-обновление схемы БД. Для разработки удобно update, для продакшена - validate или none
spring.jpa.hibernate.ddl-auto=update
# Показывать SQL-запросы в консоли (очень полезно для отладки и демонстрации N+1)
spring.jpa.show-sql=true
# Форматировать SQL для читаемости
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false